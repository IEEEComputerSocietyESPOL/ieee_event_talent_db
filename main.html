  <!-- BARRA DEL LOGO -->
  <div class="logo-barra">
    <img src="icons/Logo_CS_ESPOL.png" alt="IEEE Computer Society" class="LogoCompSoc">
    <img src="icons/LOGO_WIE_ESPOL.png" alt="WIE ESPOL" class="LogoWiee">
  </div>

  <!-- FORMULARIO CARD -->
  <div class="form-card">

    <!-- Header -->
    <div class="form-header">
      <div class="form-header-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div>
        <h1>Registro estudiantil</h1>
        <p>WIE Week 2026 ESPOL</p>
      </div>
    </div>

    <!-- Barra de pasos -->
    <div class="steps-bar">
      <div class="steps-track">

        <div class="step-item active" id="si-1">
          <div class="step-circle" id="sc-1">1</div>
          <div class="step-label">Datos personales</div>
        </div>

        <div class="step-item" id="si-2">
          <div class="step-circle" id="sc-2">2</div>
          <div class="step-label">Datos académicos</div>
        </div>

        <div class="step-item" id="si-3">
          <div class="step-circle" id="sc-3">3</div>
          <div class="step-label">Datos profesionales</div>
        </div>

      </div>
    </div>

    <!-- Body -->
    <div class="form-body">

      <!-- ===== PASO 1: Datos personales ===== -->
      <div class="step-panel visible" id="panel-1">
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <span class="section-title">Datos personales</span>
          </div>

          <div class="grid-2">
            <div class="field-wrapper">
              <label class="field-label">Nombres <span class="req">*</span></label>
              <input type="text" placeholder="Ej. Christian David" class="form-input nombre">
            </div>
            <div class="field-wrapper">
              <label class="field-label">Correo electrónico <span class="req">*</span></label>
              <input type="email" placeholder="@gmail.com, @espol.edu.ec, etc." class="form-input correo">
            </div>
          </div>

          <div class="grid-2">
            <div class="field-wrapper">
              <label class="field-label">Apellidos <span class="req">*</span></label>
              <input type="text" placeholder="Ej. Olmedo Benítez" class="form-input apellido">
            </div>
            <div class="field-wrapper">
              <label class="field-label">Teléfono <span class="req">*</span></label>
              <input type="tel" placeholder="+593 091 234 5678" class="form-input telefono">
            </div>
          </div>

          <div class="field-wrapper mb-0">
            <label class="field-label">Ciudad de residencia <span class="req">*</span></label>
            <input type="text" placeholder="Ej. Guayaquil, Cuenca, etc." class="form-input ciudad">
          </div>
        </div>
      </div>

      <!-- ===== PASO 2: Datos académicos ===== -->
      <div class="step-panel" id="panel-2">
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 14l9-5-9-5-9 5 9 5z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 14l6.16-3.422A12.083 12.083 0 0121 21H3a12.083 12.083 0 012.84-10.422L12 14z"/>
              </svg>
            </div>
            <span class="section-title">Datos académicos</span>
          </div>

          <div class="field-wrapper">
            <label class="field-label">Carrera <span class="req">*</span></label>
            <input type="text" placeholder="Ej. Computación, Mecatrónica, etc." class="form-input carrera">
          </div>
          <div class="field-wrapper">
            <label class="field-label">Semestre que cursa <span class="req">*</span></label>
            <select class="form-input semestre">
              <option value="" disabled selected>Selecciona un semestre</option>
              <option value="1">1er semestre</option>
              <option value="2">2do semestre</option>
              <option value="3">3er semestre</option>
              <option value="4">4to semestre</option>
              <option value="5">5to semestre</option>
              <option value="6">6to semestre</option>
              <option value="7">7mo semestre</option>
              <option value="8">8vo semestre</option>
            </select>
          </div>
          <div class="field-wrapper mb-0">
            <label class="field-label">Fecha estimada de graduación <span class="req">*</span></label>
            <input type="date" class="form-input fecha">
          </div>
        </div>
      </div>

      <!-- ===== PASO 3: Datos profesionales ===== -->
      <div class="step-panel" id="panel-3">
        <div class="section-card">

    <!-- Botones de navegación -->

      <button type="button" class="btn btn-secondary" id="btn-back" onclick="goBack()" disabled>

      <span class="step-counter" id="step-counter">Paso 1 de 3</span>
