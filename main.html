<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIE | Registro estudiantil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- FIGURAS DE FONDO -->
  <div class="fondo-wrapper">

    <!-- Engranaje izquierdo -->
    <svg class="engranaje-izq" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.82c-.14-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.18-.8-1.86-1.08L14.5 2.42c-.04-.26-.26-.42-.5-.42h-4c-.24 0-.46.16-.5.42L9.13 5.36C8.45 5.64 7.84 6 7.27 6.44L4.53 5.34c-.24-.08-.52 0-.66.24L1.67 9.4c-.14.24-.08.54.13.7L4.12 11.9c-.04.34-.07.69-.07 1.1s.03.74.07 1.08L1.8 15.9c-.21.16-.27.46-.13.7l2.2 3.82c.14.24.42.32.66.24l2.74-1.1c.57.44 1.18.8 1.86 1.08l.37 2.94c.04.26.26.42.5.42h4c.24 0 .46-.16.5-.42l.37-2.94c.68-.28 1.29-.64 1.86-1.08l2.74 1.1c.24.08.52 0 .66-.24l2.2-3.82c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
    </svg>

    <!-- Átomo arriba derecha -->
    <svg class="atomo-der" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="48" ry="20"/>
      <ellipse cx="50" cy="50" rx="48" ry="20" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="48" ry="20" transform="rotate(120 50 50)"/>
      <circle cx="50" cy="50" r="5" fill="currentColor"/>
    </svg>

  </div>

  <!-- BARRA DEL LOGO -->
  <div class="logo-barra">
    <img src = "Logo_CS_ESPOL.png" alt="IEEE Computer Society" class="LogoCompSoc">
    <img src="LOGO_WIE_ESPOL.png" alt="WIE ESPOL" class="LogoWiee">
    
  </div>

  <!-- FORMULARIO CARD -->
  <div class="form-card">

    <!-- Header -->
    <div class="form-header">
      <div class="form-header-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div>
        <h1>Registro estudiantil</h1>
        <p>WIE Week 2026 ESPOL</p>
      </div>
    </div>

    <!-- Body -->
    <div class="form-body">

      <!-- Datos personales -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <span class="section-title">Datos personales</span>
        </div>

        <div class="grid-2">
          <div class="field-wrapper">
            <label class="field-label">Nombres <span class="req">*</span></label>
            <input type="text" placeholder="Ej. Chritian David" class="form-input">
          </div>
          <div class="field-wrapper">
            <label class="field-label">Correo electrónico <span class="req">*</span></label>
            <input type="email" placeholder="@gmail.com, @espol.edu.ec, etc." class="form-input">
          </div>
        </div>

        <div class="grid-2">
          <div class="field-wrapper">
            <label class="field-label">Apellidos <span class="req">*</span></label>
            <input type="text" placeholder="Ej. Olmedo Benitez" class="form-input">
          </div>
          <div class="field-wrapper">
            <label class="field-label">Teléfono <span class="req">*</span></label>
            <input type="tel" placeholder="Teléfono" class="form-input">
          </div>
        </div>

        <div class="field-wrapper mb-0">
          <label class="field-label">Ciudad de residencia <span class="req">*</span></label>
          <input type="text" placeholder="Ej. Ambato, Cuenca, etc." class="form-input">
        </div>
      </div>

      <!-- Datos académicos -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 14l9-5-9-5-9 5 9 5z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 14l6.16-3.422A12.083 12.083 0 0121 21H3a12.083 12.083 0 012.84-10.422L12 14z"/>
            </svg>
          </div>
          <span class="section-title">Datos académicos</span>
        </div>

        <div class="field-wrapper">
          <label class="field-label">Carrera <span class="req">*</span></label>
          <input type="text" placeholder="Ej. Computación, Mecatrónica, etc." class="form-input">
        </div>
        <div class="field-wrapper">
          <label class="field-label">Semestre que cursa <span class="req">*</span></label>
          <!--cambiar por etiqueda select (type -> select) cuyos sememestres vayan del primero al 8vo-->
          <input type="text" placeholder="Semestre que cursa" class="form-input">
          
        </div>
        <div class="field-wrapper mb-0">
          <label class="field-label">Fecha estimada de graduación <span class="req">*</span></label>
          <!--cambiar type a date para mejor relacion en el tipo de campo-->
          <input type="text" placeholder="Fecha estimada de graduación" class="form-input">
        </div>
      </div>

      <!-- Datos profesionales -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <span class="section-title">Datos profesionales</span>
        </div>

        <div class="field-wrapper">
          <label class="field-label">Enlace al perfil de LinkedIn <span class="req">*</span></label>
          <input type="url" placeholder="URL al su perfil" class="form-input">
        </div>

        <!-- Áreas de interés -->
        <div class="upload-area">
          <label class="field-label">Áreas de interés <span class="req">*</span></label>
          <div class="chips-group">
            <input class="chip-input" type="checkbox" id="area-sw" name="areas" value="software">
            <label class="chip-label" for="area-sw">Software/dev</label>

            <input class="chip-input" type="checkbox" id="area-data" name="areas" value="data">
            <label class="chip-label" for="area-data">Data/IA</label>

            <input class="chip-input" type="checkbox" id="area-elec" name="areas" value="electronica">
            <label class="chip-label" for="area-elec">Electrónica</label>

            <input class="chip-input" type="checkbox" id="area-redes" name="areas" value="redes">
            <label class="chip-label" for="area-redes">Redes/telecom</label>

            <input class="chip-input" type="checkbox" id="area-gti" name="areas" value="gestionti">
            <label class="chip-label" for="area-gti">Gestión TI</label>

            <input class="chip-input" type="checkbox" id="area-log" name="areas" value="logistica">
            <label class="chip-label" for="area-log">Logística</label>

            <input class="chip-input" type="checkbox" id="area-otro" name="areas" value="otro">
            <label class="chip-label" for="area-otro">Otro</label>
          </div>
        </div>

        <!-- Tipo de oportunidad -->
        <div class="upload-area">
          <label class="field-label">Tipo de oportunidad buscada <span class="req">*</span></label>
          <div class="chips-group">
            <input class="chip-input" type="checkbox" id="op-pasantia" name="oportunidad" value="pasantia">
            <label class="chip-label" for="op-pasantia">Pasantías</label>

            <input class="chip-input" type="checkbox" id="op-medio" name="oportunidad" value="medio">
            <label class="chip-label" for="op-medio">Trabajo medio tiempo</label>

            <input class="chip-input" type="checkbox" id="op-full" name="oportunidad" value="full">
            <label class="chip-label" for="op-full">Jornada completa</label>
          </div>
        </div>

        <!-- Adjuntar CV -->
        <div class="upload-area mb-0">
          <label class="field-label">Adjuntar CV <span class="req">*</span></label>
          <label for="cv-upload" class="btn-upload">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
            </svg>
            Adjuntar archivo
          </label>
          
        </div>
      </div>

      <!-- Botones -->
      <div class="form-actions">
        <button type="button" class="btn btn-secondary"
          onclick="document.querySelectorAll('.form-input').forEach(i => i.value = '');
                   document.querySelectorAll('.chip-input').forEach(c => c.checked = false);
                   document.getElementById('cv-name').textContent = '';
                   document.getElementById('cv-upload').value = '';">
          Limpiar formulario
        </button>
        <button type="button" class="btn btn-primary">
          Enviar datos
        </button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
