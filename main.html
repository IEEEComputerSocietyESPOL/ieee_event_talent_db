<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIE | Registro estudiantil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  //Falta dividir todo el código de aqui en componentes
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

    * { font-family: 'Nunito', sans-serif; font-style: normal; box-sizing: border-box; }

    /* Chip toggle styles */
    .chip-input { display: none; }
    .chip-label {
      display: inline-flex;
      align-items: center;
      padding: 5px 16px;
      border-radius: 9999px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
      user-select: none;
    }
    .chip-input:checked + .chip-label {
      background-color: #6B21A8;
      border-color: #6B21A8;
      color: white;
    }
    .chip-label:hover { border-color: #6B21A8; }

    /* Input base styles */
    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #d1d5db;
      padding: 8px 0 5px 0;
      font-size: 14px;
      color: #111827;
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: #6B21A8; }
    .form-input::placeholder { color: #6b7280; font-size: 14px; font-style: italic; }

    /* Section card */
    .section-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 26px 30px;
      margin-bottom: 18px;
    }

    /* File upload area */
    .upload-area {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      background: #fafafa;
    }

    /* Required asterisk */
    .req { color: #6B21A8; font-size: 12px; margin-left: 2px; }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .section-icon {
      width: 32px; height: 32px;
      background: #f5eeff;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }

    /* Field wrapper */
    .field-wrapper { position: relative; margin-bottom: 22px; }
    .field-label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

    <h1>Registro estudiantil</h1>



    <script src="script.js"></script>
</body>
</html>
