<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIE | Registro estudiantil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  //Falta dividir todo el código de aqui en componentes
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

    * { font-family: 'Nunito', sans-serif; font-style: normal; box-sizing: border-box; }

    /* Chip toggle styles */
    .chip-input { display: none; }
    .chip-label {
      display: inline-flex;
      align-items: center;
      padding: 5px 16px;
      border-radius: 9999px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
      user-select: none;
    }
    .chip-input:checked + .chip-label {
      background-color: #6B21A8;
      border-color: #6B21A8;
      color: white;
    }
    .chip-label:hover { border-color: #6B21A8; }

    /* Input base styles */
    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #d1d5db;
      padding: 8px 0 5px 0;
      font-size: 14px;
      color: #111827;
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: #6B21A8; }
    .form-input::placeholder { color: #6b7280; font-size: 14px; font-style: italic; }

    /* Section card */
    .section-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 26px 30px;
      margin-bottom: 18px;
    }

    /* File upload area */
    .upload-area {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      background: #fafafa;
    }

    /* Required asterisk */
    .req { color: #6B21A8; font-size: 12px; margin-left: 2px; }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .section-icon {
      width: 32px; height: 32px;
      background: #f5eeff;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }

    /* Field wrapper */
    .field-wrapper { position: relative; margin-bottom: 22px; }
    .field-label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

  <!-- FORM CARD -->
  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- Header -->
    <div class="bg-[#6B21A8] px-8 py-5 flex items-center gap-5">
      <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-white font-semibold text-xl leading-tight">Registro estudiantil</h1>
        <p class="text-white/70 text-sm">WIE Week 2026 ESPOL</p>
      </div>
    </div>

    <!-- Form body -->
    <div class="p-7">

      <!-- Datos personales -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg class="w-4 h-4 text-[#6B21A8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <span class="section-title">Datos personales</span>
        </div>

        <!-- Row: Nombres + Correo -->
        <div class="grid grid-cols-2 gap-x-6 mb-4">
          <div class="field-wrapper">
            <label class="field-label">Nombres <span class="req">*</span></label>
            <input type="text" placeholder="Nombres" class="form-input">
          </div>
          <div class="field-wrapper">
            <label class="field-label">Correo electrónico <span class="req">*</span></label>
            <input type="email" placeholder="Correo electrónico" class="form-input">
          </div>
        </div>

        <!-- Row: Apellidos + Teléfono -->
        <div class="grid grid-cols-2 gap-x-6 mb-4">
          <div class="field-wrapper">
            <label class="field-label">Apellidos <span class="req">*</span></label>
            <input type="text" placeholder="Apellidos" class="form-input">
          </div>
          <div class="field-wrapper">
            <label class="field-label">Teléfono: <span class="req">*</span></label>
            <input type="tel" placeholder="Teléfono" class="form-input">
          </div>
        </div>

        <!-- Ciudad de residencia -->
        <div class="field-wrapper mb-0">
          <label class="field-label">Ciudad de residencia <span class="req">*</span></label>
          <input type="text" placeholder="Ciudad de residencia" class="form-input">
        </div>
      </div>

      <!-- Datos académicos -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg class="w-4 h-4 text-[#6B21A8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 14l9-5-9-5-9 5 9 5z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 14l6.16-3.422A12.083 12.083 0 0121 21H3a12.083 12.083 0 012.84-10.422L12 14z"/>
            </svg>
          </div>
          <span class="section-title">Datos académicos</span>
        </div>

        <div class="field-wrapper">
          <label class="field-label">Carrera <span class="req">*</span></label>
          <input type="text" placeholder="Carrera" class="form-input">
        </div>
        <div class="field-wrapper">
          <label class="field-label">Semestre que cursa <span class="req">*</span></label>
          <input type="text" placeholder="Semestre que cursa" class="form-input">
        </div>
        <div class="field-wrapper mb-0">
          <label class="field-label">Fecha estimada de graduación <span class="req">*</span></label>
          <input type="text" placeholder="Fecha estimada de graduación" class="form-input">
        </div>
      </div>

      <!-- Datos profesionales -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg class="w-4 h-4 text-[#6B21A8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <span class="section-title">Datos profesionales</span>
        </div>

        <!-- LinkedIn -->
        <div class="field-wrapper">
          <label class="field-label">Enlace al perfil de LinkedIn <span class="req">*</span></label>
          <input type="url" placeholder="Enlace al perfil de LinkedIn" class="form-input">
        </div>

        <!-- Áreas de interés -->
        <div class="upload-area mb-4">
          <label class="field-label mb-2 block">Áreas de interés <span class="req">*</span></label>
          <div class="flex flex-wrap gap-2 mt-2">
            <input class="chip-input" type="checkbox" id="area-sw" name="areas" value="software">
            <label class="chip-label" for="area-sw">Software/dev</label>

            <input class="chip-input" type="checkbox" id="area-data" name="areas" value="data">
            <label class="chip-label" for="area-data">Data/IA</label>

            <input class="chip-input" type="checkbox" id="area-elec" name="areas" value="electronica">
            <label class="chip-label" for="area-elec">Electrónica</label>

            <input class="chip-input" type="checkbox" id="area-redes" name="areas" value="redes">
            <label class="chip-label" for="area-redes">Redes/telecom</label>

            <input class="chip-input" type="checkbox" id="area-gti" name="areas" value="gestionti">
            <label class="chip-label" for="area-gti">Gestión TI</label>

            <input class="chip-input" type="checkbox" id="area-log" name="areas" value="logistica">
            <label class="chip-label" for="area-log">Logística</label>

            <input class="chip-input" type="checkbox" id="area-otro" name="areas" value="otro">
            <label class="chip-label" for="area-otro">Otro</label>
          </div>
        </div>

        <!-- Tipo de oportunidad -->
        <div class="upload-area mb-4">
          <label class="field-label mb-2 block">Tipo de oportunidad buscada <span class="req">*</span></label>
          <div class="flex flex-wrap gap-2 mt-2">
            <input class="chip-input" type="checkbox" id="op-pasantia" name="oportunidad" value="pasantia">
            <label class="chip-label" for="op-pasantia">Pasantías</label>

            <input class="chip-input" type="checkbox" id="op-medio" name="oportunidad" value="medio">
            <label class="chip-label" for="op-medio">Trabajo medio tiempo</label>

            <input class="chip-input" type="checkbox" id="op-full" name="oportunidad" value="full">
            <label class="chip-label" for="op-full">Jornada completa</label>
          </div>
        </div>

        <!-- Adjuntar CV -->
        <div class="upload-area mb-0">
          <label class="field-label mb-1 block">Adjuntar CV <span class="req">*</span></label>
          <div class="mt-2">
            <label for="cv-upload"
              class="inline-flex items-center gap-2 bg-[#6B21A8] hover:bg-[#5B1A90] text-white text-xs font-medium px-4 py-2 rounded-lg cursor-pointer transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
              </svg>
              Adjuntar archivo
            </label>
            <input id="cv-upload" type="file" accept=".pdf,.doc,.docx" class="hidden"
              onchange="document.getElementById('cv-name').textContent = this.files[0]?.name || ''">
            <span id="cv-name" class="ml-3 text-xs text-gray-400"></span>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-center gap-5 mt-3 pb-2">
        <button type="button"
          onclick="document.querySelectorAll('.form-input').forEach(i=>i.value=''); document.querySelectorAll('.chip-input').forEach(c=>c.checked=false); document.getElementById('cv-name').textContent=''; document.getElementById('cv-upload').value='';"
          class="px-10 py-3.5 rounded-lg bg-[#374151] hover:bg-[#1f2937] text-white text-sm font-medium transition-colors">
          Limpiar formulario
        </button>
        <button type="button"
          class="px-10 py-3.5 rounded-lg bg-[#6B21A8] hover:bg-[#5B1A90] text-white text-sm font-medium transition-colors">
          Enviar datos
        </button>
      </div>

    </div>
  </div>
    <script src="script.js"></script>

</body>
</html>
