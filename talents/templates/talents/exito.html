{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso - WIE Week</title>
    <link rel="stylesheet" href="{% static 'talents/style.css' %}">
    <style>
        .container-exito {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 20px;
        }
        .card-exito {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            border-top: 5px solid #6B21A8;
        }
        .icon-check {
            background: #F3E8FF;
            color: #6B21A8;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
        .btn-regresar {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #6B21A8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-regresar:hover {
            background: #581C87;
        }
    </style>
</head>
<body style="background-color: #F9FAFB; font-family: sans-serif;">

    <div class="container-exito">
        <div class="card-exito">
            <div class="icon-check">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:48px; height:48px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h1 style="color: #111827; font-size: 24px; margin-bottom: 10px;">¡Ya estás registrado, John!</h1>
            <p style="color: #4B5563; font-size: 16px; line-height: 1.5;">
                Tu perfil de talento ha sido guardado correctamente. Los patrocinadores de la <strong>WIE Week ESPOL</strong> podrán revisar tu CV y enlaces profesionales.
            </p>

            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #E5E7EB; display: flex; justify-content: center; gap: 20px;">
                <img src="{% static 'talents/icons/Logo_CS_ESPOL.png' %}" alt="CS Logo" style="height: 40px; object-fit: contain;">
                <img src="{% static 'talents/icons/LOGO_WIE_ESPOL.png' %}" alt="WIE Logo" style="height: 40px; object-fit: contain;">
            </div>

            <a href="/registro/" class="btn-regresar">← Volver al formulario</a>
        </div>
    </div>

</body>
</html>
